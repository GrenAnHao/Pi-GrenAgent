name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: ''
            sidecar_target: aarch64-apple-darwin
          # Intel macOS DMG must build on an x86_64 runner: bun --compile produces a
          # host-arch binary, so an ARM runner cannot produce a usable pi-x86_64 sidecar.
          - platform: macos-15-intel
            args: '--target x86_64-apple-darwin'
            rust_targets: x86_64-apple-darwin
            sidecar_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
            sidecar_target: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''
            sidecar_target: ''

    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: tauri-agent
        run: bun install --frozen-lockfile

      - name: Build sidecar
        working-directory: tauri-agent
        env:
          PI_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
        run: bun run build:sidecar

      - name: Build codebase-memory binary
        working-directory: tauri-agent
        run: bun run build:codebasememory

      - name: Read release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          NOTES=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Release notes not found: $NOTES" >&2
            exit 1
          fi
          {
            echo 'body<<EOF'
            cat "$NOTES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-agent
          tagName: ${{ github.ref_name }}
          releaseName: GrenAgent v__VERSION__
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
